<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Pizza</title>
    <link href="./output.css" rel="stylesheet" />
    <link
      rel="shortcut icon"
      href="../favicon/favicon.ico"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="../js/index-template.js" type="module" defer></script>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main>
      <section class="pt-40 pb-6">
        <div class="container">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5473.599289801083!2d121.34074972807043!3d14.052407229466414!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33bd43b339004c8d%3A0x85e5f269d071ff31!2sAngel&#39;s%20Pizza%20-%20San%20Pablo!5e0!3m2!1sen!2sph!4v1772753586947!5m2!1sen!2sph"
            class="w-full aspect-video px-2"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </section>

      <section class="py-16 bg-secondary">
        <div class="container">
          <h2 class="uppercase text-black mb-8 text-center text-5xl">get in touch</h2>
          <div class="max-w-fit md:max-w-full lg:px-60 mx-auto">
            <form action="" class="grid grid-cols-1 gap-3 justify-center items-center text-center">
              <div class="contact-input name">
                <input type="text" placeholder="First Name" />
                <input type="text" placeholder="Last Name" />
              </div>
              <div class="contact-input info">
                <input type="text" placeholder="Email Address" />
                <input type="text" placeholder="Subject" />
                <textarea name="" id="" placeholder="Your Message" rows="8"></textarea>
              </div>
              <a href="#" class="btn btn--primary w-fit text-center mx-auto">SUBMIT FORM</a>
            </form>
          </div>
        </div>
      </section>
    </main>
    <!-- Main Content -->
    <div id="footer-placeholder"></div>
    <!-- scripts -->
    <script src="../js/index.js" type="module"></script>
  </body>
</html>
